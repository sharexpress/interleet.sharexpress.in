server {
    listen 80;
    listen [::]:80;

    server_name interleet.sharexpress.in;

    root /home/santusht/desktop/projects/interleet/frontend/dist;
    index index.html;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static assets: immutable cache (hashed filenames) ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Prerendered route pages ─────────────────────────────
    # Try route-specific index.html first (e.g., /login/index.html),
    # then fall back to SPA root for client-side routing.
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # ── Block crawlers from authenticated routes ────────────
    location /app/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri /index.html;
    }

    location /admin {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri /index.html;
    }

    location /onboarding {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri /index.html;
    }

    # ── Error pages ─────────────────────────────────────────
    error_page 404 /index.html;
}
