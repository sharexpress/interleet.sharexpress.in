name: Interleet CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Frontend Linting and Build Verification
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend Quality & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Linter
        run: |
          cd frontend
          npm run lint || echo "Linting warnings found (non-blocking)"

      - name: Build Application
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Compilation & Verification
  # ─────────────────────────────────────────────────────────────────────────────
  backend-check:
    name: Backend Compilation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Compile Python Files
        run: |
          python -m compileall backend/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Automated Deployment via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Self-Hosted Server
    needs: [frontend-check, backend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Project Files
        run: |
          echo "Syncing repository files to the projects folder..."
          rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.venv' ./ /home/santusht/desktop/projects/interleet/

      - name: Build Frontend
        run: |
          echo "Building frontend assets..."
          cd /home/santusht/desktop/projects/interleet/frontend
          npm install
          npm run build

      - name: Restart Backend (PM2)
        run: |
          echo "Restarting PM2 backend application..."
          pm2 restart interleet --update-env

      - name: Print Status
        run: |
          echo "🎉 Remote deployment successfully completed locally on the server!"
