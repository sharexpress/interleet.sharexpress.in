name: Interleet CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Frontend Linting and Build Verification
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend Quality & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Linter
        run: |
          cd frontend
          npm run lint || echo "Linting warnings found (non-blocking)"

      - name: Build Application
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Backend Compilation & Verification
  # ─────────────────────────────────────────────────────────────────────────────
  backend-check:
    name: Backend Compilation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Compile Python Files
        run: |
          python -m compileall backend/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Automated Deployment via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [frontend-check, backend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script: |
            echo "🏁 SSH session started on production server..."
            set -e
            
            cd /home/santusht/desktop/projects/interleet
            
            echo "📥 Fetching latest commits..."
            git stash
            git pull origin main
            git stash pop || true
            
            echo "🏗️ Building frontend in production..."
            cd frontend
            npm install
            npm run build
            
            echo "🔄 Restarting backend process under PM2..."
            pm2 restart interleet --update-env
            
            echo "Deployment successfully complete!"
