name: CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Project Files
        run: |
          echo "Syncing repository files to the projects folder..."
          rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.venv' ./ /home/santusht/desktop/projects/interleet/

      - name: Build Frontend
        run: |
          echo "Building frontend assets..."
          cd /home/santusht/desktop/projects/interleet/frontend
          npm install
          npm run build

      - name: Restart Backend (PM2)
        run: |
          echo "Restarting PM2 backend application..."
          pm2 restart interleet --update-env
